      align-items: center;
      justify-content: center;
      height: 100vh;
      background: white;
    }

      align-items: center;
      justify-content: center;
      width: 50%;
      height: 50vh;
      box-shadow: 0 32px 32px -8px rgba(0, 0, 0, 0.5);
    }

      position: fixed;
      width: 50vw;
      height: 60vh;
    }

      intensity: 0.2,
      image1:
        "https://images.unsplash.com/photo-1608501078713-8e445a709b39?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MXx8d2FsbHBhcGVyJTIwNGt8ZW58MHx8MHx8&auto=format&fit=crop&w=600&q=60",
